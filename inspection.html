<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentProof — Inspections</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <div class="topbar">
    <a href="index.html" class="brand"><span class="brand-mark">RP</span> RentProof</a>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="inspection.html" class="active">Inspections</a>
      <a href="maintenance.html">Maintenance</a>
      <a href="documents.html">Documents</a>
      <a href="report.html">Evidence Report</a>
    </div>
    <div class="user-chip">
      <span id="userName">…</span>
      <button class="icon-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <main class="content">
    <span class="eyebrow">Move-in / move-out walkthrough</span>
    <h1 class="page-title">Inspections</h1>
    <p class="page-sub">Walk through each room and log its condition. Photos are timestamped automatically — that timestamp is what makes this useful later.</p>

    <div class="card">
      <form id="entryForm">
        <div class="field-row">
          <div>
            <label for="walkthroughType">Walkthrough type</label>
            <select id="walkthroughType">
              <option value="move-in">Move-in</option>
              <option value="move-out">Move-out</option>
            </select>
          </div>
          <div>
            <label for="room">Room</label>
            <input type="text" id="room" placeholder="e.g. Kitchen, Bedroom, Bathroom" required>
          </div>
        </div>

        <label for="notes">Condition notes</label>
        <textarea id="notes" placeholder="Describe what you see — existing scuffs, working appliances, anything already damaged." required></textarea>

        <label for="photos">Photos</label>
        <input type="file" id="photos" accept="image/*" multiple capture="environment">
        <div id="previewGrid" class="grid grid-3 mt-1" style="display:none;"></div>

        <button type="submit" class="btn btn-primary mt-1" id="saveBtn">Save entry</button>
      </form>
    </div>

    <div class="section-head mt-2">
      <h3 style="color:var(--paper);">Logged entries</h3>
    </div>
    <div id="entryList"></div>
  </main>
</div>

<script type="module" src="js/inspection.js"></script>
</body>
</html>
