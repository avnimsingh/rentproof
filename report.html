<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentProof — Evidence Report</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .report-page {
    background: var(--paper);
    color: var(--ink-text);
    max-width: 800px;
    margin: 0 auto;
    padding: 48px;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
  }
  .report-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 3px solid var(--ink-text);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }
  .report-section-title {
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin: 30px 0 14px;
    color: var(--ink-text);
  }
  .report-entry { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--border); }
  .report-entry:last-child { border-bottom: none; }
  .report-photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px; }
  .report-photos img { width: 100%; border-radius: 4px; border: 1px solid var(--border); }
  @media print {
    body { background: #fff !important; }
    .app-shell > .topbar, .no-print { display: none !important; }
    main.content { padding: 0; max-width: none; }
    .report-page { box-shadow: none; max-width: none; padding: 0; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div class="topbar no-print">
    <a href="index.html" class="brand"><span class="brand-mark">RP</span> RentProof</a>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="inspection.html">Inspections</a>
      <a href="maintenance.html">Maintenance</a>
      <a href="documents.html">Documents</a>
      <a href="report.html" class="active">Evidence Report</a>
    </div>
    <div class="user-chip">
      <span id="userName">…</span>
      <button class="icon-btn" id="logoutBtn">Log out</button>
    </div>
  </div>

  <main class="content">
    <div class="no-print">
      <span class="eyebrow">Everything, compiled</span>
      <h1 class="page-title">Evidence Report</h1>
      <p class="page-sub">Every inspection entry, maintenance request, and document you've logged, compiled into one dated report. Use the button below to save it as a PDF.</p>
      <button class="btn btn-primary mt-1" id="printBtn" style="margin-bottom:28px;">Download as PDF</button>
    </div>

    <div class="report-page" id="reportContent">
      <p class="text-muted">Building your report…</p>
    </div>
  </main>
</div>

<script type="module" src="js/report.js"></script>
</body>
</html>
